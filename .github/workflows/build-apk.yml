name: Build Star Chat APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Create Android project
        run: |
          mkdir -p app/src/main/java/com/starchat/app
          mkdir -p app/src/main/assets
          cp -r index.html app.js style.css manifest.json logo.png firebase-messaging-sw.js assets app/src/main/assets/ || true

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories{ google(); mavenCentral() } }
          rootProject.name='StarChat'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.5.2' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins { id 'com.android.application' }

          android {
              namespace 'com.starchat.app'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.starchat.app'
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>

              <application
                  android:theme="@style/AppTheme"
                  android:label="Star Chat"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowFullscreen">false</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/java/com/starchat/app/MainActivity.java <<'EOF'
          package com.starchat.app;

          import android.Manifest;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              WebView webView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  webView = new WebView(this);
                  setContentView(webView);

                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setDatabaseEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);
                  s.setMediaPlaybackRequiresUserGesture(false);

                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

          sed -i "s/plugins { id 'com.android.application' }/plugins { id 'com.android.application' }/" app/build.gradle
          sed -i "1i buildscript { repositories { google(); mavenCentral() } dependencies { classpath 'androidx.appcompat:appcompat:1.7.0' } }" build.gradle

      - name: Build APK
        run: |
          chmod +x ./gradlew || true
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StarChat-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

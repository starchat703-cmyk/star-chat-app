name: Build Star Chat APK With AdMob

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create Android Project
        run: |
          mkdir -p app/src/main/java/com/starchat/app
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          cp index.html app/src/main/assets/ || true
          cp app.js app/src/main/assets/ || true
          cp style.css app/src/main/assets/ || true
          cp manifest.json app/src/main/assets/ || true
          cp logo.png app/src/main/assets/ || true
          cp firebase-messaging-sw.js app/src/main/assets/ || true
          cp -r assets app/src/main/assets/ || true

          sudo apt-get update
          sudo apt-get install -y imagemagick

          convert logo.png -resize 48x48 app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert logo.png -resize 72x72 app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert logo.png -resize 96x96 app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert logo.png -resize 144x144 app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert logo.png -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          cat > gradle.properties <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m
          android.suppressUnsupportedCompileSdk=35
          EOF

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'StarChat'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.5.2' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.starchat.app'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.starchat.app'
                  minSdk 23
                  targetSdk 35
                  versionCode 2
                  versionName '1.1'
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'com.google.android.gms:play-services-ads:23.6.0'
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowBackground">#020916</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.VIBRATE"/>

              <application
                  android:theme="@style/AppTheme"
                  android:label="Star Chat"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">

                  <meta-data
                      android:name="com.google.android.gms.ads.APPLICATION_ID"
                      android:value="ca-app-pub-2795375653009372~8956273123"/>

                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/starchat/app/MainActivity.java <<'EOF'
          package com.starchat.app;

          import android.app.Activity;
          import android.os.Bundle;
          import android.os.Handler;
          import android.view.Gravity;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.FrameLayout;

          import com.google.android.gms.ads.AdRequest;
          import com.google.android.gms.ads.AdSize;
          import com.google.android.gms.ads.AdView;
          import com.google.android.gms.ads.MobileAds;
          import com.google.android.gms.ads.LoadAdError;
          import com.google.android.gms.ads.interstitial.InterstitialAd;
          import com.google.android.gms.ads.interstitial.InterstitialAdLoadCallback;
          import com.google.android.gms.ads.rewarded.RewardedAd;
          import com.google.android.gms.ads.rewarded.RewardedAdLoadCallback;

          public class MainActivity extends Activity {
              WebView webView;
              FrameLayout root;
              AdView bannerAd;
              InterstitialAd interstitialAd;
              RewardedAd rewardedAd;

              final String BANNER_ID = "ca-app-pub-2795375653009372/9601507474";
              final String INTERSTITIAL_ID = "ca-app-pub-2795375653009372/6629492681";
              final String REWARDED_ID = "ca-app-pub-2795375653009372/9064084337";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  MobileAds.initialize(this, status -> {});
                  root = new FrameLayout(this);
                  setContentView(root);

                  openWebView();
                  loadBanner();
                  loadInterstitial();
                  loadRewarded();
              }

              void openWebView() {
                  webView = new WebView(this);
                  root.addView(webView, new FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.MATCH_PARENT,
                      FrameLayout.LayoutParams.MATCH_PARENT
                  ));

                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setDatabaseEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);
                  s.setMediaPlaybackRequiresUserGesture(false);

                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.addJavascriptInterface(new AdsBridge(), "AndroidAds");
                  webView.loadUrl("file:///android_asset/index.html");
              }

              void loadBanner() {
                  bannerAd = new AdView(this);
                  bannerAd.setAdUnitId(BANNER_ID);
                  bannerAd.setAdSize(AdSize.BANNER);

                  FrameLayout.LayoutParams params = new FrameLayout.LayoutParams(
                      FrameLayout.LayoutParams.WRAP_CONTENT,
                      FrameLayout.LayoutParams.WRAP_CONTENT
                  );
                  params.gravity = Gravity.BOTTOM | Gravity.CENTER_HORIZONTAL;

                  root.addView(bannerAd, params);
                  bannerAd.loadAd(new AdRequest.Builder().build());
              }

              void loadInterstitial() {
                  InterstitialAd.load(this, INTERSTITIAL_ID, new AdRequest.Builder().build(),
                      new InterstitialAdLoadCallback() {
                          @Override
                          public void onAdLoaded(InterstitialAd ad) {
                              interstitialAd = ad;
                          }

                          @Override
                          public void onAdFailedToLoad(LoadAdError error) {
                              interstitialAd = null;
                          }
                      });
              }

              void showInterstitial() {
                  if (interstitialAd != null) {
                      interstitialAd.show(this);
                      interstitialAd = null;
                      loadInterstitial();
                  }
              }

              void loadRewarded() {
                  RewardedAd.load(this, REWARDED_ID, new AdRequest.Builder().build(),
                      new RewardedAdLoadCallback() {
                          @Override
                          public void onAdLoaded(RewardedAd ad) {
                              rewardedAd = ad;
                          }

                          @Override
                          public void onAdFailedToLoad(LoadAdError error) {
                              rewardedAd = null;
                          }
                      });
              }

              void showRewarded() {
                  if (rewardedAd != null) {
                      rewardedAd.show(this, rewardItem -> {
                          webView.post(() -> webView.evaluateJavascript(
                              "window.dispatchEvent(new CustomEvent('adRewardEarned',{detail:{coins:10}}));",
                              null
                          ));
                      });
                      rewardedAd = null;
                      loadRewarded();
                  }
              }

              public class AdsBridge {
                  @JavascriptInterface
                  public void showInterstitialAd() {
                      runOnUiThread(() -> showInterstitial());
                  }

                  @JavascriptInterface
                  public void showRewardedAd() {
                      runOnUiThread(() -> showRewarded());
                  }
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StarChat-AdMob-APK
          path: app/build/outputs/apk/debug/app-debug.apk
